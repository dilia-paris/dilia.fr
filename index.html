    </style>
    
    <!-- Set lang attribute dynamically based on URL path -->
    <script>
      (function() {
        var path = window.location.pathname;
        var lang = path.startsWith('/en') ? 'en' : 'fr';
        document.documentElement.lang = lang;
      }());
    </script>
    
    <!-- Handle GitHub Pages SPA redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    
    <!-- Preload main CSS and load asynchronously to avoid render blocking -->
    <link rel="preload" href="/dilia.fr/assets/index-BU7eP16Z.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="/dilia.fr/assets/index-BU7eP16Z.css"></noscript>
  </head>
