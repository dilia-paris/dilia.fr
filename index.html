<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon and mobile icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/DILIA-logo-piccolo-nero1.gif" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect hints for performance -->
    <link rel="preconnect" href="https://dilia.fr" />
    <link rel="preconnect" href="https://www.facebook.com" />
    <link rel="dns-prefetch" href="https://dilia.fr" />
    <link rel="dns-prefetch" href="https://www.facebook.com" />
    
    <!-- Default meta description (overridden by SEOHead component) -->
    <meta name="description" content="Dilia - trois lieux, un même esprit. Restaurant italien gastronomique, épicerie fine, cave à vins et distribution." />
    
    <!-- Set lang attribute dynamically based on URL path -->
    <script>
      (function() {
        var path = window.location.pathname;
        var lang = path.startsWith('/en') ? 'en' : 'fr';
        document.documentElement.lang = lang;
      }());
    </script>
    
    <!-- Handle GitHub Pages SPA redirect -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
