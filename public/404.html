<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dilia Paris</title>
    <script>
      // Single Page App redirect for GitHub Pages
      // This script redirects 404s to index.html while preserving the URL path
      
      // Get the path after the base URL
      var pathSegmentsToKeep = 1; // Keep 1 segment for /dilia.fr/
      
      var l = window.location;
      // Store the original path in sessionStorage
      sessionStorage.setItem('redirect', l.pathname);
      // Redirect to index.html
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
